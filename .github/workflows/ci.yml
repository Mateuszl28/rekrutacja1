name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Anuluj starsze uruchomienia dla tej samej gałęzi/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
